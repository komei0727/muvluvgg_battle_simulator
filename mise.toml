min_version = "2026.6.14"

[tools]
node = "24.18.0"
pnpm = "11.8.0"

[settings]
lockfile = true
lockfile_platforms = ["macos-arm64", "linux-x64"]
minimum_release_age = "24h"

[tasks.install]
description = "Install dependencies from the lockfile"
run = "pnpm install --frozen-lockfile"

[tasks.dev]
description = "Start the development server"
depends = ["install"]
run = "pnpm --filter api run dev"

[tasks.typecheck]
run = "pnpm --filter api run typecheck"

[tasks.lint]
run = "pnpm --filter api run lint"

[tasks.format-check]
run = "pnpm run format:check"

[tasks.test]
run = "pnpm --filter api run test"

[tasks."test:coverage"]
description = "Run unit/scenario/contract tests with coverage report"
run = "pnpm --filter api run test:coverage"

[tasks."test:integration"]
description = "Run Worker and HTTP integration tests"
run = "pnpm --filter api run test:integration"

[tasks."test:e2e"]
description = "Run end-to-end tests (HTTP to Worker to Battle)"
run = "pnpm --filter api run test:e2e"

[tasks."test:load"]
description = "Run load and soak tests (nightly / pre-release)"
run = "pnpm --filter api run test:load"

[tasks.build]
run = "pnpm --filter api run build"

[tasks.check-circular]
description = "Detect circular dependencies between source files"
run = "pnpm --filter api run check:circular"

[tasks."test:container"]
description = "Build the production container image and run local Docker smoke tests (non-root, PORT/HOST, Catalog/Worker/OpenAPI, SIGTERM)"
run = "bash scripts/container-smoke-test.sh"

[tasks."ci:test"]
description = "Test the CI changed-path classification logic (scripts/ci/)"
run = "node --test scripts/ci/*.test.mjs"

[tasks.check]
description = "Run all validation tasks"
depends = [
  "typecheck",
  "lint",
  "format-check",
  "test",
  "build",
  "check-circular",
  "ui:typecheck",
  "ui:lint",
  "ui:test",
  "ui:build",
  "ci:test",
]

[tasks."ui:typecheck"]
description = "Type-check the apps/ui/ workspace"
run = "pnpm --filter ui run typecheck"

[tasks."ui:lint"]
description = "Lint the apps/ui/ workspace"
run = "pnpm --filter ui run lint"

[tasks."ui:test"]
description = "Run apps/ui/ unit and component tests"
run = "pnpm --filter ui run test"

[tasks."ui:build"]
description = "Build the apps/ui/ workspace for production"
run = "pnpm --filter ui run build"

[tasks."ui:e2e"]
description = "Run apps/ui/ Playwright end-to-end smoke tests (excludes @visual: platform-portable, safe on any local OS)"
run = "pnpm --filter ui run test:e2e"

[tasks."ui:e2e:visual"]
description = "Run apps/ui/ Playwright visual regression tests (@visual only; baselines are Linux-only, CI-use is expected)"
run = "pnpm --filter ui run test:e2e:visual"

[tasks."ui:dev"]
run = "pnpm --filter ui exec vite --port 5173"
