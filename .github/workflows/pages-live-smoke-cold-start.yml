name: Deployed Pages Live Smoke Test (Cold Start)

# `main.yml`の`pages-smoke`はdeploy直後に実行されるため、直前のCatalog／
# simulation smoke testでCloud Run instanceが既にwarmであり、Issue #99の
# 「scale-to-zero後のcold startを含むlive smoke testが成功する」を実証しない
# （PRレビュー指摘 #125 P2）。Cloud Run(min instances 0)はtraffic途絶から
# 十分な時間が経てばscale-to-zeroするため、mainへの通常のdeploy／push活動から
# 独立した時刻に実行することで、cold startを実際に踏む形でこの受け入れ条件を
# 固定する。
on:
  schedule:
    # 04:00 JST — 深夜帯はdeploy／手動操作によるtrafficがほぼ無く、Cloud Runが
    # scale-to-zeroしている可能性が高い時間帯を狙う。
    - cron: "0 19 * * *"
  workflow_dispatch: {}

jobs:
  cold-start-smoke:
    name: Live smoke test against a cold-started Cloud Run instance
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - uses: jdx/mise-action@v2

      - name: Install dependencies
        run: mise run install

      - name: Install Playwright browser
        run: pnpm --filter ui exec playwright install --with-deps chromium

      # GitHub PagesのURL自体はdeployごとに変わらないため、`vars`ではなく
      # project pageの既知path(02_フロントエンドアーキテクチャ設計.md §6.1、
      # CORS_ALLOWED_ORIGINSの`https://komei0727.github.io`と同じorigin)を使う。
      - name: Live smoke test against deployed Pages + Cloud Run API (expect cold start)
        run: mise run ui:e2e:live
        env:
          LIVE_PAGES_URL: https://komei0727.github.io/muvluvgg_battle_simulator/
          LIVE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL }}

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: pages-cold-start-smoke-report
          path: apps/ui/test-results/
          retention-days: 7
