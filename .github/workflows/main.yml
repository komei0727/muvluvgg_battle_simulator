name: Main Branch Quality Gate

on:
  push:
    branches: [main]

jobs:
  # Always runs (no workflow-level `on.push.paths` filter) so required
  # status checks report success/skipped rather than never triggering when
  # a merge only touches one workspace. Downstream jobs (including the
  # Cloud Run deploy) read its outputs and skip themselves at the job level
  # — this avoids creating an unnecessary API revision on a UI-only merge
  # (PR #118 review). Decision logic: scripts/ci/classify-changed-paths.mjs.
  changes:
    name: Detect changed workspaces
    runs-on: ubuntu-latest
    outputs:
      run_api: ${{ steps.classify.outputs.run_api }}
      run_ui: ${{ steps.classify.outputs.run_ui }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: jdx/mise-action@v2

      - name: Install dependencies
        run: mise run install

      # Runs here, not in `quality`, because `quality` skips on a UI-only
      # merge — this job is the only one guaranteed to always run, and
      # format-check covers the whole repo tree regardless of workspace
      # (PR #118 review: a UI-only Prettier violation was passing CI).
      - name: Format check
        run: mise run format-check

      - name: Test the change-classification logic
        run: mise run ci:test

      - name: Classify changed paths
        id: classify
        env:
          BEFORE_SHA: ${{ github.event.before }}
          AFTER_SHA: ${{ github.sha }}
        run: |
          ZERO_SHA="0000000000000000000000000000000000000000"
          if [ "$BEFORE_SHA" = "$ZERO_SHA" ] || ! git cat-file -e "$BEFORE_SHA" 2>/dev/null; then
            # New branch or an unresolvable base (force-push, history
            # rewrite): fail safe and run both gates rather than guess.
            echo "run_api=true" >> "$GITHUB_OUTPUT"
            echo "run_ui=true" >> "$GITHUB_OUTPUT"
          else
            git diff --name-only "$BEFORE_SHA" "$AFTER_SHA" \
              | mise exec -- node scripts/ci/classify-changed-paths.mjs \
              >> "$GITHUB_OUTPUT"
          fi

  quality:
    name: Full Quality Gate
    needs: changes
    if: needs.changes.outputs.run_api == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: jdx/mise-action@v2

      - name: Install dependencies
        run: mise run install

      - name: Type check
        run: mise run typecheck

      - name: Lint
        run: mise run lint

      - name: Unit / Scenario / Contract tests with coverage
        run: mise run test:coverage

      - name: Build
        run: mise run build

      - name: Worker integration tests
        run: mise run test:integration

      - name: HTTP + Worker end-to-end tests
        run: mise run test:e2e

      - name: Circular dependency check
        run: mise run check-circular

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: apps/api/coverage/

  ui:
    name: UI Quality Gate
    needs: changes
    if: needs.changes.outputs.run_ui == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: jdx/mise-action@v2

      - name: Install dependencies
        run: mise run install

      - name: UI type check
        run: mise run ui:typecheck

      - name: UI lint
        run: mise run ui:lint

      - name: UI unit / component tests
        run: mise run ui:test

      - name: UI build (GitHub Pages base path)
        run: mise run ui:build
        env:
          VITE_BASE_PATH: /muvluvgg_battle_simulator/
          VITE_API_BASE_URL: https://ci-build-placeholder.invalid.example

      - name: Install Playwright browser
        run: pnpm --filter ui exec playwright install --with-deps chromium

      - name: UI end-to-end smoke test
        run: mise run ui:e2e

  deploy:
    name: Deploy to Cloud Run
    needs: [changes, quality, ui]
    # `needs` on a skipped job does not by itself skip this job (a skipped
    # dependency is not a failure, so the implicit success() check still
    # passes) — the run_api check must be explicit, or a UI-only merge
    # would still deploy an unchanged API image (PR #118 review).
    if: github.ref == 'refs/heads/main' && needs.changes.outputs.run_api == 'true'
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read
      id-token: write
    env:
      PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
      REGION: ${{ vars.GCP_REGION || 'asia-northeast1' }}
      REPOSITORY: ${{ vars.GCP_ARTIFACT_REGISTRY_REPOSITORY || 'muvluvgg-battle-simulator' }}
      SERVICE: ${{ vars.GCP_CLOUD_RUN_SERVICE || 'muvluvgg-battle-simulator-api' }}
      IMAGE_TAG: ${{ github.sha }}
    steps:
      - uses: actions/checkout@v4

      - uses: jdx/mise-action@v2

      - name: Install dependencies
        run: mise run install

      # Workload Identity Federationで短期credentialを取得する。GitHub Secretsへ
      # Google Cloud service account JSON keyなどの長期credentialは保存しない
      # （Issue #106 `M45-INFRA-002`受け入れ条件）。
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          project_id: ${{ vars.GCP_PROJECT_ID }}
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT_EMAIL }}

      # google-github-actions/authだけではgcloud CLI自体は認証済みにならない
      # （client library向けのADCファイルを出すのみ）ため、setup-gcloudで
      # gcloud CLIへ同じcredentialを引き継ぐ。
      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Build and push image to Artifact Registry
        id: build
        run: scripts/cloud-run/02-build-and-push-image.sh

      # 新revisionをtraffic 0%・`candidate` tag付きで作成する。既存traffic
      # (直前の正常revision）は動かさないため、この時点ではproduction traffic
      # に一切影響しない。
      - name: Deploy candidate revision (0% traffic)
        id: deploy_candidate
        run: scripts/cloud-run/ci-deploy-candidate.sh

      # 受け入れ条件「最小simulationが成功してからtrafficを確定する」を満たす
      # ため、candidateのCatalogから選択可能なUnitを見つけてrequestを組み立てる。
      # 選択可能なUnitが無い場合はここでjobを失敗させる——smoke testを
      # 黙ってskipしない（PRレビュー指摘 #112 P1-3）。
      - name: Build minimal simulation smoke test request
        env:
          SERVICE_URL: ${{ steps.deploy_candidate.outputs.candidate_url }}
        run: |
          curl -sS "$SERVICE_URL/api/v1/battle-simulation-catalog" \
            | mise exec -- pnpm --filter api exec tsx src/infrastructure/deploy/build-simulation-smoke-request-cli.ts \
            > /tmp/muvluvgg-smoke-simulation-request.json

      # smoke test失敗時はここでjobが停止し、以降のtraffic切替・GitHub
      # Environment更新は実行されない——新revisionへproduction trafficは流れない。
      - name: Smoke test candidate revision
        env:
          SERVICE_URL: ${{ steps.deploy_candidate.outputs.candidate_url }}
          SMOKE_SIMULATION_BODY_FILE: /tmp/muvluvgg-smoke-simulation-request.json
        run: scripts/cloud-run/04-smoke-test.sh

      - name: Promote candidate revision to 100% traffic
        env:
          REVISION_NAME: ${{ steps.deploy_candidate.outputs.revision_name }}
        run: scripts/cloud-run/ci-promote-traffic.sh

      - name: Resolve Catalog revision served by the promoted revision
        id: catalog_revision
        env:
          SERVICE_URL: ${{ steps.deploy_candidate.outputs.candidate_url }}
        run: |
          CATALOG_REVISION="$(curl -sS "$SERVICE_URL/api/v1/battle-simulation-catalog" \
            | mise exec -- node -e 'let d="";process.stdin.on("data",c=>d+=c).on("end",()=>{process.stdout.write(JSON.parse(d).catalogRevision)})')"
          echo "catalog_revision=$CATALOG_REVISION" >> "$GITHUB_OUTPUT"

      # `gh variable set`はGITHUB_TOKENでは書き込めない（repository/environment
      # variableのAPIはrepo scopeを要求する）ため、Variables書き込みのみに
      # 絞ったfine-grained PATを`VARS_ADMIN_TOKEN`として使う
      # （scripts/cloud-run/README.md参照）。
      - name: Publish Cloud Run URL to the production GitHub Environment
        env:
          GH_TOKEN: ${{ secrets.VARS_ADMIN_TOKEN }}
        run: |
          PUBLIC_URL="$(gcloud run services describe "$SERVICE" \
            --region="$REGION" \
            --project="$PROJECT_ID" \
            --format='value(status.url)')"
          gh variable set VITE_API_BASE_URL --env production --repo "${{ github.repository }}" --body "$PUBLIC_URL"

      - name: Record deploy summary
        run: |
          {
            echo "### Cloud Run deploy"
            echo "- Git SHA: \`${{ github.sha }}\`"
            echo "- Image digest: \`${{ steps.build.outputs.image_digest }}\`"
            echo "- Cloud Run revision: \`${{ steps.deploy_candidate.outputs.revision_name }}\`"
            echo "- Previous revision: \`${{ steps.deploy_candidate.outputs.previous_revision_name }}\`"
            echo "- Catalog revision: \`${{ steps.catalog_revision.outputs.catalog_revision }}\`"
          } >> "$GITHUB_STEP_SUMMARY"

  # `deploy`（API）が既にCloud Run service URLを`production` GitHub Environmentの
  # `VITE_API_BASE_URL`へ書き込んでいる（運用手順.md「Cloud Run deploy」）ため、
  # このjobは`environment: production`で同じ変数を読むだけでよい——UI-only
  # mergeでは`deploy`がskipされるが、そのときも直近のCloud Run deployで書き込み
  # 済みの値がそのまま`production` environmentに残っているため利用できる。
  pages-build:
    name: Build UI for GitHub Pages
    needs: [changes, quality, ui, deploy]
    # `deploy`同様、`needs`の暗黙のsuccess()は依存jobがskipでも真になる
    # （PR #118 review、上のコメント参照）ため、run_ui・ui成功・quality/deployの
    # 成功/skip許容を明示条件にする。`quality`が失敗すると`deploy`はdependency
    # failureで`skipped`になり、run_api=='false'によるUI-only mergeの正常な
    # `skipped`と区別がつかない——`needs.quality.result`も明示チェックしない
    # 限り、Full Quality Gate失敗commitでもui成功だけでPagesへ公開されてしまう
    # （PR #125レビュー指摘 P1）。
    if: |
      always() &&
      github.ref == 'refs/heads/main' &&
      needs.changes.outputs.run_ui == 'true' &&
      needs.ui.result == 'success' &&
      (needs.quality.result == 'success' || needs.quality.result == 'skipped') &&
      (needs.deploy.result == 'success' || needs.deploy.result == 'skipped')
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read
      pages: write
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: jdx/mise-action@v2

      - name: Install dependencies
        run: mise run install

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      # `VITE_API_BASE_URL`は`production` environmentの実際のCloud Run service
      # URL（`deploy` jobが書き込み済み）。CIの`ui`job（placeholder URL）とは
      # 別のbuildであり、index.htmlのCSP `connect-src`もこの値へ静的に展開される
      # （05_非機能・アクセシビリティ設計.md §11）。
      - name: UI build (GitHub Pages, live API base URL)
        run: mise run ui:build
        env:
          VITE_BASE_PATH: /muvluvgg_battle_simulator/
          VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL }}
          VITE_BUILD_REVISION: ${{ github.sha }}

      # rollbackのために、実際にbuildした静的ファイルそのものを長期保持する。
      # `VITE_BUILD_REVISION`(=`github.sha`)がbundleへ埋め込まれる以上、revert
      # commitは異なるSHAを持つため再buildしたcontentは前回成功時と一致し得ず、
      # digest比較によるrollback検証は原理的に成立しない
      # （実測: 同一sourceでもVITE_BUILD_REVISIONだけが異なるとdist全体の
      # digestが変わることをPRレビューで確認済み——PRレビュー指摘 #125
      # 再レビューP2）。そのため「再buildして同一性を確認する」のではなく、
      # 「rebuildせずこのartifactをそのまま将来再deployできるようにする」方針へ
      # 変更する。`pages-rollback.yml`がこの`pages-dist` artifactを
      # `run-id`指定でdownloadし、rebuildなしでそのままdeployする
      # （運用手順.md「GitHub Pages rollback」）。
      - name: Retain built Pages content for rollback
        uses: actions/upload-artifact@v4
        with:
          name: pages-dist
          path: apps/ui/dist
          retention-days: 90

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: apps/ui/dist

  pages-deploy:
    name: Deploy to GitHub Pages
    needs: pages-build
    # 上と同じ理由でskipを明示的に伝播させる——pages-buildがskipされた場合、
    # 既定のsuccess()はなお真になり得るため、artifactが存在しないままdeployを
    # 試みてしまう。
    if: needs.pages-build.result == 'success'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    permissions:
      pages: write
      id-token: write
    outputs:
      page_url: ${{ steps.deployment.outputs.page_url }}
    # 連続pushでdeployが競合しないようにする。GitHub Pages公式テンプレートの
    # 既定と同じ設定（cancel-in-progress: falseで進行中のdeployを打ち切らない）。
    concurrency:
      group: pages-deploy
      cancel-in-progress: false
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  # 06_UIテスト戦略.md §9「Live API E2Eは初期は別job」——他のjobはこのjobの
  # 成否を待たない。失敗を無視せず、job statusとして可視化する。
  #
  # このjobはdeploy直後に実行されるため、`deploy`（API）が実行された回は直前の
  # Catalog／simulation smoke testでCloud Run instanceが既にwarmになっており、
  # scale-to-zero後のcold startは実証できない（PRレビュー指摘 #125 P2）。
  # cold start自体の検証は`.github/workflows/pages-live-smoke-cold-start.yml`
  # （深夜cronでidle時間を確保した別workflow）が担う。
  pages-smoke:
    name: Deployed Pages live smoke test (post-deploy correctness)
    needs: pages-deploy
    if: needs.pages-deploy.result == 'success'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - uses: jdx/mise-action@v2

      - name: Install dependencies
        run: mise run install

      - name: Install Playwright browser
        run: pnpm --filter ui exec playwright install --with-deps chromium

      - name: Live smoke test against deployed Pages + Cloud Run API
        run: mise run ui:e2e:live
        env:
          LIVE_PAGES_URL: ${{ needs.pages-deploy.outputs.page_url }}
          LIVE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL }}

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: pages-live-smoke-report
          path: apps/ui/test-results/
          retention-days: 7
