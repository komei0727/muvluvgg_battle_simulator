name: Main Branch Quality Gate

on:
  push:
    branches: [main]

jobs:
  quality:
    name: Full Quality Gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: jdx/mise-action@v2

      - name: Install dependencies
        run: mise run install

      - name: Format check
        run: mise run format-check

      - name: Type check
        run: mise run typecheck

      - name: Lint
        run: mise run lint

      - name: Unit / Scenario / Contract tests with coverage
        run: mise run test:coverage

      - name: Build
        run: mise run build

      - name: Circular dependency check
        run: mise run check-circular

      - name: Integration tests
        run: mise run test:integration

      - name: End-to-end tests
        run: mise run test:e2e

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
