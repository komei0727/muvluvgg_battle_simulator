name: PR Quality Gate

on:
  pull_request:
    branches: [main]

jobs:
  quality:
    name: Quality Gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: jdx/mise-action@v2

      - name: Install dependencies
        run: mise run install

      - name: Format check
        run: mise run format-check

      - name: Type check
        run: mise run typecheck

      - name: Lint
        run: mise run lint

      - name: Unit / Scenario / Contract tests with coverage
        run: mise run test:coverage

      - name: Circular dependency check
        run: mise run check-circular

  container:
    name: Container Build and Smoke Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: jdx/mise-action@v2

      - name: Install dependencies
        run: mise run install

      - name: Production container build and local Docker smoke test
        run: mise run test:container

  ui:
    name: UI Quality Gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: jdx/mise-action@v2

      - name: Install dependencies
        run: mise run install

      - name: UI type check
        run: mise run ui:typecheck

      - name: UI lint
        run: mise run ui:lint

      - name: UI unit / component tests
        run: mise run ui:test

      - name: UI build (GitHub Pages base path)
        run: mise run ui:build
        env:
          VITE_BASE_PATH: /muvluvgg_battle_simulator/
          VITE_API_BASE_URL: https://ci-build-placeholder.invalid.example

      - name: Install Playwright browser
        run: pnpm --filter ui exec playwright install --with-deps chromium

      - name: UI end-to-end smoke test
        run: mise run ui:e2e
